<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>codenamezaxx | Personal Portfolio</title>

    <!-- Favicon -->
    <link rel="icon" href="/favicon.svg" />
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">

    <!-- Tailwind Config -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      // Apply saved theme BEFORE React mounts to prevent flash
      (function() {
        var saved = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', saved);
        if (saved === 'dark') {
          document.documentElement.style.setProperty('--color-background', '#1F1F1F');
          document.documentElement.style.setProperty('--color-surface', '#2A2A2A');
          document.documentElement.style.setProperty('--color-card', '#242424');
          document.documentElement.style.setProperty('--color-primary', '#F5F5F5');
          document.documentElement.style.setProperty('--color-muted', '#B0B0B0');
          document.documentElement.style.setProperty('--color-accent', '#D4AF37');
          document.documentElement.style.setProperty('--color-accent-glow', 'rgba(212, 175, 55, 0.12)');
        }
      })();
    </script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              background: 'var(--color-background)',
              surface: 'var(--color-surface)',
              card: 'var(--color-card)',
              accent: 'var(--color-accent)',
              'accent-glow': 'var(--color-accent-glow)',
              primary: 'var(--color-primary)',
              muted: 'var(--color-muted)',
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              display: ['Space Grotesk', 'sans-serif'],
            },
            animation: {
              'blob': 'blob 7s infinite',
              'marquee': 'marquee 25s linear infinite',
              'marquee-reverse': 'marquee-reverse 25s linear infinite',
            },
            keyframes: {
              blob: {
                '0%': { transform: 'translate(0px, 0px) scale(1)' },
                '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
                '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
                '100%': { transform: 'translate(0px, 0px) scale(1)' },
              },
              marquee: {
                '0%': { transform: 'translateX(0%)' },
                '100%': { transform: 'translateX(-100%)' },
              },
              'marquee-reverse': {
                '0%': { transform: 'translateX(-100%)' },
                '100%': { transform: 'translateX(0%)' },
              }
            }
          }
        }
      }
    </script>
    <style>
      /* CSS Variables for theming */
      :root {
        --color-background: #FAF6F1;
        --color-surface: #F5EBE0;
        --color-card: #FFFFFF;
        --color-primary: #4A4A4A;
        --color-muted: #8B7355;
        --color-accent: #B8860B;
        --color-accent-glow: rgba(184, 134, 11, 0.12);
      }

      html[data-theme="dark"] {
        --color-background: #1F1F1F;
        --color-surface: #2A2A2A;
        --color-card: #242424;
        --color-primary: #F5F5F5;
        --color-muted: #B0B0B0;
        --color-accent: #D4AF37;
        --color-accent-glow: rgba(212, 175, 55, 0.12);
      }

      * {
        transition-property: background-color, border-color, color;
        transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
        transition-duration: 300ms;
      }

      body {
        background-color: var(--color-background);
        color: var(--color-primary);
        overflow-x: hidden;
        transition: background-color 300ms ease, color 300ms ease;
      }

      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: var(--color-background);
      }
      ::-webkit-scrollbar-thumb {
        background: var(--color-accent);
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--color-accent);
        opacity: 0.8;
      }
      
      .glass-nav {
        background: rgba(var(--color-surface-rgb, 250, 246, 241), 0.8);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border-bottom: 1px solid var(--color-accent-glow);
      }

      html[data-theme="dark"] .glass-nav {
        background: rgba(42, 42, 42, 0.8);
      }

      .text-gradient {
        background: linear-gradient(to right, var(--color-accent), #CD853F, #A0724E);
        background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      /* Hide scrollbar for Chrome, Safari and Opera */
      .scrollbar-hide::-webkit-scrollbar {
        display: none;
      }
      /* Hide scrollbar for IE, Edge and Firefox */
      .scrollbar-hide {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "react": "https://esm.sh/react@^19.2.4",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "framer-motion": "https://esm.sh/framer-motion@^12.29.3"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
